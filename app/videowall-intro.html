<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyncSign · Video Wall Onboarding</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --dur: 15s;                                   /* 전체 길이: 이 값 하나만 바꾸면 됨 */
  --ease: cubic-bezier(.45, 0, .15, 1);
  --brand: #3B66F1;
  --brand-deep: #2E4FD8;
  --ink: #16233F;
  --bg: #F6F8FC;
  --bez-on: inset 0 0 0 3px #17253F, 0 12px 28px rgba(21,39,77,.16);
  --bez-off: inset 0 0 0 3px rgba(23,37,63,0), 0 12px 28px rgba(21,39,77,0);
}
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ height:100%; }
body{
  background: var(--bg);
  font-family: "Pretendard Variable", Pretendard, -apple-system, "Apple SD Gothic Neo", sans-serif;
  overflow: hidden;
}
body.paused *{ animation-play-state: paused !important; }

/* ── Stage (960×540 고정 좌표계) ─────────────────────────────── */
#stage{
  position: fixed; left:50%; top:50%;
  width: 960px; height: 540px;
  transform: translate(-50%,-50%);
  background:
    radial-gradient(760px 420px at 50% 40%, #FFFFFF 0%, rgba(255,255,255,0) 70%),
    var(--bg);
  overflow: hidden;
}

/* ── 디스플레이 그룹 (Scene 4에서 축소, Scene 5에서 페이드아웃) ── */
#group{
  position:absolute; inset:0; z-index:10;
  transform-origin: 480px 215px;
  animation: groupMove var(--dur) var(--ease) infinite;
}
@keyframes groupMove{
  0%,63% { transform: scale(1) translateY(0); opacity:1; }
  72%    { transform: scale(.62) translateY(-30px); }
  78%    { opacity:1; }
  85%,100%{ transform: scale(.62) translateY(-30px); opacity:0; }
}

/* ── 패널 3장 (가로 1×3) ─────────────────────────────────────── */
.panel{
  position:absolute; width:260px; height:170px; top:130px;
  background: linear-gradient(160deg, #14213C 0%, #0C1729 100%);
  border-radius:10px;
  box-shadow: var(--bez-on);
  opacity:0; z-index:3;
}
.panel::after{ /* 대기 상태 LED */
  content:""; position:absolute; left:50%; top:50%;
  width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%;
  background: var(--brand);
  box-shadow: 0 0 10px 2px rgba(59,102,241,.55);
  opacity:0;
  animation: standby var(--dur) var(--ease) infinite;
}
@keyframes standby{
  0%,13%{opacity:0} 17%{opacity:.85} 25%{opacity:.85} 31%,100%{opacity:0}
}
#p1{ left:90px;  animation: kp1 var(--dur) var(--ease) infinite; }
#p2{ left:350px; animation: kp2 var(--dur) var(--ease) infinite; }
#p3{ left:610px; animation: kp3 var(--dur) var(--ease) infinite; }

/* 등장(좌→우 스태거) → 21~30% 병합 → 23~32% 베젤 소멸 */
@keyframes kp1{
  0%,2%   { opacity:0; transform:translate(-30px,16px) scale(.95); }
  7%      { opacity:1; transform:translate(-30px,0) scale(1); }
  21%     { transform:translate(-30px,0); }
  30%     { transform:translate(0,0); }
  0%,23%  { border-radius:10px; box-shadow:var(--bez-on); }
  32%,100%{ border-radius:2px;  box-shadow:var(--bez-off); }
  100%    { opacity:1; transform:translate(0,0); }
}
@keyframes kp2{
  0%,4.5% { opacity:0; transform:translate(0,16px) scale(.95); }
  9.5%    { opacity:1; transform:translate(0,0) scale(1); }
  21%     { transform:translate(0,0); }
  30%     { transform:translate(0,0); }
  0%,23%  { border-radius:10px; box-shadow:var(--bez-on); }
  32%,100%{ border-radius:2px;  box-shadow:var(--bez-off); }
  100%    { opacity:1; transform:translate(0,0); }
}
@keyframes kp3{
  0%,7%   { opacity:0; transform:translate(30px,16px) scale(.95); }
  12%     { opacity:1; transform:translate(30px,0) scale(1); }
  21%     { transform:translate(30px,0); }
  30%     { transform:translate(0,0); }
  0%,23%  { border-radius:10px; box-shadow:var(--bez-on); }
  32%,100%{ border-radius:2px;  box-shadow:var(--bez-off); }
  100%    { opacity:1; transform:translate(0,0); }
}

/* ── 병합 후 외곽 프레임 ─────────────────────────────────────── */
#wallFrame{
  position:absolute; left:84px; top:124px; width:792px; height:182px;
  border-radius:12px; z-index:5; pointer-events:none;
  box-shadow: inset 0 0 0 6px #17253F, 0 26px 60px rgba(21,39,77,.20);
  opacity:0;
  animation: frameIn var(--dur) var(--ease) infinite;
}
@keyframes frameIn{ 0%,25%{opacity:0} 33%,100%{opacity:1} }

/* ── 콘텐츠 (3패널을 가로지르는 하나의 배너) ─────────────────── */
#content{
  position:absolute; left:90px; top:130px; width:780px; height:170px;
  border-radius:6px; overflow:hidden; z-index:4; opacity:0;
  animation: contentIn var(--dur) var(--ease) infinite;
}
/* 좌 → 우 와이프로 "가로로 이어지며 등장" */
@keyframes contentIn{
  0%,39% { opacity:0; clip-path: inset(0 100% 0 0); }
  41%    { opacity:1; }
  52%,100%{ opacity:1; clip-path: inset(0 0 0 0); }
}
#banner{
  position:absolute; inset:0;
  background:
    radial-gradient(300px 220px at 12% 0%, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 60%),
    radial-gradient(340px 260px at 88% 100%, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 60%),
    linear-gradient(100deg, var(--brand-deep) 0%, var(--brand) 46%, #6C8CFF 100%);
  animation: bannerSlide var(--dur) var(--ease) infinite;
}
@keyframes bannerSlide{
  0%,40%{ transform:translateX(-42px); }
  54%,100%{ transform:translateX(0); }
}

/* 좌측: 타이포 블록 */
#txtL{ position:absolute; left:36px; top:50%; transform:translateY(-50%); color:#fff; }
#txtL .eyebrow{ font-size:10.5px; font-weight:700; letter-spacing:.22em; opacity:.78; }
#txtL .title{ font-size:40px; font-weight:800; letter-spacing:.01em; line-height:1.05; margin-top:8px; }
#txtL .sub{ font-size:10px; font-weight:600; letter-spacing:.18em; opacity:.72; margin-top:9px; }

/* 중앙: 콜드브루 일러스트 */
#glass{
  position:absolute; left:362px; top:24px; width:78px; height:116px;
  border:3px solid rgba(255,255,255,.6);
  border-radius:10px 10px 20px 20px;
  background:rgba(255,255,255,.12);
}
#coffee{
  position:absolute; left:5px; right:5px; bottom:5px; height:66px;
  background:linear-gradient(180deg, #8A5A32 0%, #5C3A1E 100%);
  border-radius:4px 4px 14px 14px;
}
#glass .gloss{
  position:absolute; left:9px; top:8px; width:7px; height:92px;
  background:rgba(255,255,255,.32); border-radius:4px;
}
.ice{ position:absolute; background:rgba(255,255,255,.55); border-radius:6px; }
#ice1{ left:14px; top:38px; width:22px; height:22px; transform:rotate(-14deg); }
#ice2{ left:38px; top:50px; width:19px; height:19px; transform:rotate(21deg); background:rgba(255,255,255,.42); }
#ice3{ left:24px; top:66px; width:16px; height:16px; transform:rotate(-30deg); background:rgba(255,255,255,.35); }
/* 스플래시 — 패널 경계를 자연스럽게 가로지름 */
.blob{ position:absolute; border-radius:50%; }
#b1{ left:448px; top:30px; width:12px; height:12px; background:rgba(255,255,255,.5); }
#b2{ left:468px; top:52px; width:7px;  height:7px;  background:rgba(255,255,255,.38); }
#b3{ left:454px; top:70px; width:9px;  height:9px;  background:#8A5A32; opacity:.85; }
#b4{ left:340px; top:44px; width:8px;  height:8px;  background:rgba(255,255,255,.4); }
#b5{ left:330px; top:76px; width:6px;  height:6px;  background:#8A5A32; opacity:.7; }
#swash{
  position:absolute; left:436px; top:34px; width:54px; height:38px;
  border:5px solid rgba(255,255,255,.4); border-radius:50%;
  border-left-color:transparent; border-bottom-color:transparent;
  transform:rotate(24deg);
}

/* 경계(seam) 위 NEW 배지 */
#newBadge{
  position:absolute; left:498px; top:56px; width:58px; height:58px;
  border:2px solid rgba(255,255,255,.8); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:12.5px; font-weight:700; letter-spacing:.1em;
}

/* 우측: 카피 */
#txtR{ position:absolute; left:592px; top:50%; transform:translateY(-50%); color:#fff; }
#txtR .l1{ font-size:14px; font-weight:500; opacity:.85; }
#txtR .l2{ font-size:21px; font-weight:800; letter-spacing:-0.01em; margin-top:7px; }

/* 패널 경계선(시임): 3개 패널이 하나의 콘텐츠를 나눠 재생 중임을 표시 */
.seam{ position:absolute; top:0; bottom:0; width:2px; background:rgba(10,20,40,.30); z-index:6; }
#seam1{ left:259px; } #seam2{ left:519px; }

/* 하이라이트 스윕 */
#shine{
  position:absolute; top:-20px; bottom:-20px; width:150px;
  background: linear-gradient(100deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.28) 50%, rgba(255,255,255,0) 100%);
  transform: translateX(-260px) skewX(-16deg); z-index:7;
  animation: shineMove var(--dur) var(--ease) infinite;
}
@keyframes shineMove{
  0%,50%{ transform:translateX(-260px) skewX(-16deg); }
  58%,100%{ transform:translateX(880px) skewX(-16deg); }
}

/* ── Scene 4 환경(카페) ──────────────────────────────────────── */
#env{ position:absolute; inset:0; z-index:1; opacity:0; animation: envIn var(--dur) var(--ease) infinite; }
@keyframes envIn{ 0%,64%{opacity:0} 71%{opacity:1} 78%{opacity:1} 85%,100%{opacity:0} }
#floor{ position:absolute; left:0; right:0; top:464px; height:76px; background:#E9EEF6; border-top:2px solid #DCE3F0; }
.pendant{ position:absolute; top:-8px; width:2px; background:#C9D3E6; }
.pendant .lamp{
  position:absolute; left:50%; bottom:-16px; width:18px; height:18px; margin-left:-9px;
  border-radius:50%; background:#17253F;
}
.pendant .lamp::after{ content:""; position:absolute; left:6px; top:6px; width:5px; height:5px; border-radius:50%; background:#8FA8FF; }
#pd1{ left:299px; height:56px; } #pd2{ left:659px; height:70px; }
#counter{
  position:absolute; left:210px; top:388px; width:540px; height:78px;
  background:#FFFFFF; border:2px solid #E1E8F4; border-bottom:none; border-radius:12px 12px 0 0;
}
#counter::before{ content:""; position:absolute; left:-10px; top:-12px; width:556px; height:12px; background:#D8E0F0; border-radius:6px; }
#machine{ position:absolute; left:262px; top:342px; width:86px; height:46px; background:#17253F; border-radius:8px; }
#machine::after{ content:""; position:absolute; right:10px; top:10px; width:6px; height:6px; border-radius:50%; background:var(--brand); }
.cup{ position:absolute; top:376px; width:16px; height:14px; background:#fff; border:2px solid #D8E0F0; border-radius:2px 2px 4px 4px; }
#cup1{ left:388px; } #cup2{ left:414px; } #cup3{ left:648px; }
#plantPot{ position:absolute; left:806px; top:406px; width:48px; height:58px; background:#DCE3F1; border-radius:5px 5px 12px 12px; }
.leaf{ position:absolute; width:18px; height:66px; background:#A9BFB3; border-radius:50%; }
#lf1{ left:810px; top:346px; transform:rotate(-18deg); }
#lf2{ left:822px; top:338px; }
#lf3{ left:834px; top:346px; transform:rotate(18deg); }
.envShadow{ position:absolute; height:10px; background:rgba(21,39,77,.07); border-radius:50%; filter:blur(3px); }
#sh1{ left:206px; top:468px; width:552px; } #sh2{ left:798px; top:468px; width:70px; }

/* ── 캡션 ────────────────────────────────────────────────────── */
.caption{
  position:absolute; left:0; right:0; top:360px; text-align:center; z-index:15;
  font-size:26px; font-weight:700; color:var(--ink); letter-spacing:-0.015em;
  line-height:1.45; opacity:0;
}
.caption .hl, #endcard .hl{ color:var(--brand); }
#c1{ animation: cap1 var(--dur) var(--ease) infinite; }
#c2{ animation: cap2 var(--dur) var(--ease) infinite; }
#c3{ animation: cap3 var(--dur) var(--ease) infinite; }
#c4{ top:288px; animation: cap4 var(--dur) var(--ease) infinite; }
@keyframes cap1{ 0%,3%{opacity:0; transform:translateY(10px)} 7%{opacity:1; transform:translateY(0)} 16%{opacity:1; transform:translateY(0)} 20%,100%{opacity:0; transform:translateY(-8px)} }
@keyframes cap2{ 0%,23%{opacity:0; transform:translateY(10px)} 27%{opacity:1; transform:translateY(0)} 34%{opacity:1; transform:translateY(0)} 38%,100%{opacity:0; transform:translateY(-8px)} }
@keyframes cap3{ 0%,44%{opacity:0; transform:translateY(10px)} 48%{opacity:1; transform:translateY(0)} 58%{opacity:1; transform:translateY(0)} 62%,100%{opacity:0; transform:translateY(-8px)} }
@keyframes cap4{ 0%,67%{opacity:0; transform:translateY(10px)} 71%{opacity:1; transform:translateY(0)} 77%{opacity:1; transform:translateY(0)} 81%,100%{opacity:0; transform:translateY(-8px)} }

/* ── 엔드 카드 ───────────────────────────────────────────────── */
#endcard{
  position:absolute; left:0; right:0; top:250px; text-align:center; z-index:15;
  opacity:0;
  animation: endIn var(--dur) var(--ease) infinite;
}
#endcard .main{ font-size:32px; font-weight:700; color:var(--ink); letter-spacing:-0.02em; }
@keyframes endIn{ 0%,83%{opacity:0; transform:translateY(14px)} 89%,100%{opacity:1; transform:translateY(0)} }

/* ── 루프용 베일 ─────────────────────────────────────────────── */
#veil{ position:absolute; inset:0; background:var(--bg); z-index:90; pointer-events:none;
  animation: veil var(--dur) linear infinite; }
@keyframes veil{ 0%{opacity:1} 4%{opacity:0} 95%{opacity:0} 100%{opacity:1} }

/* ── Reduced motion: 대표 프레임 정지 화면 ───────────────────── */
@media (prefers-reduced-motion: reduce){
  *{ animation: none !important; }
  .panel{ opacity:1; border-radius:2px; box-shadow:var(--bez-off); }
  #wallFrame{ opacity:1; }
  #content{ opacity:1; clip-path:none; }
  #banner{ transform:none; }
  #c3{ opacity:1; }
  #veil{ display:none; }
}
</style>
</head>
<body>
<div id="stage">

  <!-- Scene 4 환경 -->
  <div id="env">
    <div id="floor"></div>
    <div class="pendant" id="pd1"><span class="lamp"></span></div>
    <div class="pendant" id="pd2"><span class="lamp"></span></div>
    <div class="envShadow" id="sh1"></div>
    <div class="envShadow" id="sh2"></div>
    <div id="counter"></div>
    <div id="machine"></div>
    <div class="cup" id="cup1"></div>
    <div class="cup" id="cup2"></div>
    <div class="cup" id="cup3"></div>
    <div class="leaf" id="lf1"></div>
    <div class="leaf" id="lf2"></div>
    <div class="leaf" id="lf3"></div>
    <div id="plantPot"></div>
  </div>

  <!-- 디스플레이 그룹 -->
  <div id="group">
    <div class="panel" id="p1"></div>
    <div class="panel" id="p2"></div>
    <div class="panel" id="p3"></div>

    <div id="content">
      <div id="banner">
        <div id="txtL">
          <div class="eyebrow">SYNC CAFÉ</div>
          <div class="title">COLD BREW</div>
          <div class="sub">SUMMER LIMITED MENU</div>
        </div>

        <div id="glass">
          <div id="coffee"></div>
          <div class="gloss"></div>
          <div class="ice" id="ice1"></div>
          <div class="ice" id="ice2"></div>
          <div class="ice" id="ice3"></div>
        </div>
        <div id="swash"></div>
        <div class="blob" id="b1"></div>
        <div class="blob" id="b2"></div>
        <div class="blob" id="b3"></div>
        <div class="blob" id="b4"></div>
        <div class="blob" id="b5"></div>

        <div id="newBadge">NEW</div>

        <div id="txtR">
          <div class="l1">부드럽고 깔끔한</div>
          <div class="l2">콜드브루의 신선함</div>
        </div>
      </div>

      <div class="seam" id="seam1"></div>
      <div class="seam" id="seam2"></div>
      <div id="shine"></div>
    </div>

    <div id="wallFrame"></div>
  </div>

  <!-- 캡션 -->
  <div class="caption" id="c1">여러 대의 디스플레이,<br><span class="hl">따로따로</span> 관리하고 계신가요?</div>
  <div class="caption" id="c2">이제 <span class="hl">하나의 화면으로</span><br>연결해보세요</div>
  <div class="caption" id="c3">이어지는 하나의 화면,<br><span class="hl">더 크게</span> 전해지는 메시지</div>
  <div class="caption" id="c4">매장에서 바로 보여지는<br><span class="hl">생생한 연결</span></div>

  <!-- 엔드 카드 -->
  <div id="endcard">
    <div class="main">비디오월로 <span class="hl">더 넓고 강력하게</span> 전달하세요</div>
  </div>

  <div id="veil"></div>
</div>

<script>
// 뷰포트에 맞춰 960×540 스테이지 스케일
function fit(){
  const s = Math.min(window.innerWidth / 960, window.innerHeight / 540);
  document.getElementById('stage').style.transform =
    'translate(-50%,-50%) scale(' + s + ')';
}
window.addEventListener('resize', fit);
fit();

// Space: 일시정지 / 재생 (녹화 시 유용)
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    document.body.classList.toggle('paused');
  }
});
</script>
</body>
</html>
